    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark: #0a0f1a;
            --bg-card: #111827;
            --bg-nav: rgba(10, 15, 26, 0.92);
            --text-primary: #e8edf5;
            --text-secondary: #d0d2d7;
            --text-muted: #d0d2d7;
            --accent: #6ea8d7;
            --accent-glow: rgba(110, 168, 215, 0.15);
            --border: rgba(138, 155, 185, 0.12);
            --font-display: 'DM Serif Display', Georgia, serif;
            --font-body: 'IBM Plex Sans', -apple-system, sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        html, body {
            width: 100%; height: 100%;
            font-family: var(--font-body);
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ── Navigation ── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            background: var(--bg-nav);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: 56px;
        }

        .nav-brand {
            font-family: var(--font-display);
            font-size: 1.15rem;
            color: var(--text-primary);
            letter-spacing: 0.01em;
            text-decoration: none;
        }

        .nav-links { display: flex; gap: 0.25rem; }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            padding: 0.45rem 0.9rem;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.05);
        }

        .nav-links a.active {
            color: var(--accent);
            background: var(--accent-glow);
        }

        /* ── Map ── */
        #map {
            position: absolute;
            top: 56px; bottom: 0; left: 0; right: 0;
        }


        /* ── Custom Markers ── */
        .custom-marker { background: none; border: none; }

        .marker-dot {
            width: 12px; height: 12px;
            background: var(--accent);
            border: 2px solid var(--bg-dark);
            border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(110,168,215,0.25), 0 2px 8px rgba(0,0,0,0.3);
            transition: all 0.25s ease;
            cursor: pointer;
        }

        .marker-dot:hover {
            transform: scale(1.6);
            box-shadow: 0 0 0 6px rgba(110,168,215,0.2), 0 2px 16px rgba(0,0,0,0.4);
        }

        /* ── Popup Styling ── */
        .leaflet-popup-content-wrapper {
            background: var(--bg-card) !important;
            color: var(--text-primary) !important;
            border-radius: 12px !important;
            box-shadow: 0 12px 48px rgba(0,0,0,0.5), 0 0 0 1px var(--border) !important;
            padding: 0 !important;
            overflow: hidden;
        }

        .leaflet-popup-content {
            margin: 0 !important;
            font-family: var(--font-body) !important;
            line-height: 1.55 !important;
            max-height: 420px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--text-muted) transparent;
        }

        .leaflet-popup-content::-webkit-scrollbar { width: 4px; }
        .leaflet-popup-content::-webkit-scrollbar-track { background: transparent; }
        .leaflet-popup-content::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

        .leaflet-popup-tip {
            background: var(--bg-card) !important;
            box-shadow: none !important;
        }

        .leaflet-popup-close-button {
            color: var(--text-muted) !important;
            font-size: 20px !important;
            padding: 6px 10px !important;
            z-index: 10;
        }
        .leaflet-popup-close-button:hover { color: var(--text-primary) !important; }

        /* Popup inner content — targets original inline styles */
        .leaflet-popup-content h3 {
            font-family: var(--font-display);
            font-size: 1.15rem;
            font-weight: 400;
            color: var(--text-primary);
            padding: 1rem 1.2rem 0.7rem;
            border-bottom: 1px solid var(--border);
            margin: 0;
        }

        .leaflet-popup-content p { padding: 0.3rem 1.2rem; margin: 0; }

        .leaflet-popup-content p[style*="font-size:14px"],
        .leaflet-popup-content p[style*="font-size: 14px"] {
            font-size: 0.82rem !important;
            color: var(--text-primary) !important;
            padding-top: 0.7rem;
        }

        .leaflet-popup-content p[style*="font-size:14px"] strong,
        .leaflet-popup-content p[style*="font-size: 14px"] strong {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--accent);
        }

        .leaflet-popup-content p[style*="font-size:14px"] em,
        .leaflet-popup-content p[style*="font-size: 14px"] em {
            font-style: normal;
            font-weight: 600;
        }

        .leaflet-popup-content p[style*="font-size:12px"],
        .leaflet-popup-content p[style*="font-size: 12px"] {
            font-size: 0.73rem !important;
            color: var(--text-muted) !important;
            line-height: 1.65 !important;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--border);
        }

        .leaflet-popup-content p[style*="font-size:12px"]:last-child,
        .leaflet-popup-content p[style*="font-size: 12px"]:last-child {
            border-bottom: none;
            padding-bottom: 1rem;
        }

        /* ── Tooltips ── */
        .leaflet-tooltip {
            background: var(--bg-dark) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border) !important;
            border-radius: 6px !important;
            padding: 4px 10px !important;
            font-family: var(--font-body) !important;
            font-size: 0.75rem !important;
            font-weight: 500 !important;
            letter-spacing: 0.02em;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3) !important;
        }

        .leaflet-tooltip::before { border-top-color: var(--bg-dark) !important; }

        /* ── Zoom Controls ── */
        .leaflet-control-zoom a {
            background: var(--bg-card) !important;
            color: var(--text-secondary) !important;
            border: 1px solid var(--border) !important;
            width: 32px !important; height: 32px !important;
            line-height: 32px !important;
            font-size: 16px !important;
        }
        .leaflet-control-zoom a:hover { color: var(--text-primary) !important; background: #1a2233 !important; }
        .leaflet-control-zoom {
            border: none !important;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3) !important;
            border-radius: 8px !important;
            overflow: hidden;
        }

        .leaflet-control-attribution {
            background: rgba(10,15,26,0.85) !important;
            color: var(--text-muted) !important;
            font-size: 10px !important;
            font-family: var(--font-body) !important;
        }
        .leaflet-control-attribution a { color: var(--text-secondary) !important; }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            nav { padding: 0 1rem; }

            .stats-bar { bottom: 1rem; }
            .stat { padding: 0.6rem 1rem; min-width: 90px; }
            .stat-number { font-size: 1.1rem; }

    <script>
    (function() {

        var markerIcon = L.divIcon({
            className: "custom-marker",
            html: '<div class="marker-dot"></div>',
            iconSize: [12, 12],
            iconAnchor: [6, 6],
            popupAnchor: [0, -10]
        });

        var map = L.map("map", {
            center: [12, 30],
            zoom: 3,
            zoomControl: true,
            preferCanvas: false
        });

        L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: "abcd",
            maxZoom: 20
        }).addTo(map);

        function pin(lat, lng, tooltipName, popupHtml, maxW) {
            var m = L.marker([lat, lng], { icon: markerIcon }).addTo(map);
            m.bindPopup(popupHtml, { maxWidth: maxW || 500 });
            m.bindTooltip(tooltipName, { sticky: true, direction: "top", offset: [0, -8] });
        }

        pin(4.624335, -74.063644, "Colombia", `<h3>Colombia</h3>

        pin(18.9712, -72.2852, "Haiti", `<h3>Haiti</h3>
                    <p style='font-size:14px;'><strong>2024</strong>: <em>DAI</em> - USAID Eau - Home Office Technical Backstop</p>
                        <p style='font-size:12px;'>USAID's Water Security and Systems Strengthening (USAID Eau) Activity provided technical support to Haiti's water service providers and the Ministry of Environment's Institute for Water Resources Management to strengthen institutional capacity and improve management of Haiti's water resources.
                        USAID Eau supported the efforts of Haiti's National Drinking Water and Sanitation Directorate (DINEPA) and its decentralized utilities to improve drinking water services for one million Haitians. The project provided technical assistance and support to DINEPA to develop clear standards for governance and transparency in the management of the local water systems;
                        assisted water utilities to improve their management of the water systems, responsibly manage the water resources, and advance on their path towards creditworthiness; solarized water systems to reduce reliance on expensive and unreliable energy sources; and
                        promoted gender and social inclusion to mitigate the adverse effects of poor water services and poor governance on women's safety, health, and economic opportunity.
                        I served as primary technical backstop to the Haiti-based project team, working closely with the Chief of Party and Home Office Project Manager to provide regular technical quality control and review for project deliverables and supporting the project team in long-term strategic planning and implementation.</p> 
                    <p style='font-size:14px;'><strong>2024</strong>: <em>DAI</em> - USAID Fragile Waters - Water Data Specialist (STTA)</p>
                    <p style='font-size:12px;'>I was engaged by the USAID Fragile Waters activity to support USAID/Haiti in developing evidence-based toolkits to facilitate adaptive and concerted management of shared national and transboundary water resources.

        pin(23.6345, -102.5528, "Mexico", `<h3>Mexico</h3>
                    <p style='font-size:14px;'><strong>2019-2021</strong>: <em>University of Texas at Austin</em> - Research Project - 'Strengthening Systems-Based Leak Prevention in CDMX through Blockchain'</p>
                    <p style='font-size:12px;'>Ciudad de México (CDMX) loses an estimated 40 percent of water to thousands of leaks emerging throughout its over 12,000 kilometres of piped infrastructure, half of which was built six decades ago. Navigating the interrelated challenges of leak detection, maintenance, and prevention requires a systems-based approach that harmonizes the efforts of the numerous stakeholders involved in managing the metropolitan area's water infrastructure.

        pin(9.081999, 8.675277, "Nigeria", `<h3>Nigeria</h3>
                    <p style='font-size:14px;'><strong>2025-2026</strong>: <em>Castalia</em> - Igbonla Water Scheme</p>
                    <p style='font-size:12px;'>
                        The Igbonla Water Scheme is a proposed $XXXM water supply project that will deliver 100 million gallons per day to key urban and peri-urban areas of Lagos, including Epe, Eti-Osa, Ikoyi, Ibeju Lekki, Victoria Island, and Lagos Island. The project will be implemented through a long-term concession with private sector participation. As part of a team of Castalia consultants, I provided transaction advisory services to the project development consortium, consisting of a leading international private water operator, a multilateral development finance institution, and a Nigerian infrastructure development firm. Our support spans early-stage project development, commercial and technical structuring, stakeholder engagement, fundraising, and preparation for financial close.
                        </p>
                    <p style='font-size:14px;'><strong>2023-2024</strong>: <em>MIT Senseable City Lab</em> - Research Project - 'A Deep Learning Approach to Water Point Detection and Mapping Using Street-Level Imagery'</p>
                    <p style='font-size:12px;'>Households in developing countries often rely on alternative shared water sources that exist outside of the datasets of public service providers. 
                        This poses a significant challenge to accurately measuring the number of households outside the public service system that use a safe and accessible water source. 
                        This paper proposes a novel deep learning approach that utilizes a convolutional neural network to detect water points in street-level imagery from Google Street View. 
                        Using a case study of the Agege local government area in Lagos, Nigeria, the model detected 36 previously unregistered water points across a variety of urban settings and obstruction levels with 94.7% precision. 
                        The paper was developed through the support of Prof. Carlo Ratti and the MIT Senseable City Lab and was published in the IWA peer-reviewed journal Water Practice and Technology. It additionally was presented at the 2023 UNC Water & Health Conference and Technology Showcase.</p>`);

        pin(-6.369, 34.8888, "Tanzania", `<h3>Tanzania</h3>

                    <p style='font-size:14px;'><strong>2019-2020</strong>: <em>University of Texas at Austin</em> - Research Project - 'Digital Credit: Closing Rural Water Financing Gaps in Tanzania'</p>
                    <p style='font-size:12px;'> The United Republic of Tanzania explicitly recognizes the human right to water and sanitation in its constitution. However, full implementation of this right has been complicated by Tanzania's ongoing decentralization process for water governance, which has created a significant public financing gap for cash-strapped rural water schemes. Under the framework of the progressive realization of the human right to water, my undergraduate thesis examined the potential for digital credit financing to bridge the public financing gap for rural water schemes in Tanzania. The thesis utilizes (1) country-wide data on digital financial inclusion and rural water access and (2) two case studies of digital credit financing in the rural water sector to explore the viability of a digital credit financing model. I conducted a month of fieldwork in Tanzania in January 2020 as part of this project.</p>`);
